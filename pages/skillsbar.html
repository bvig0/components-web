<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="X-UA-Compatible" content="ie=7">
    <meta name="description" content="Projeto de página unica que mostra as skills">
    <meta name="author" content="Brian Vigo de Oliveira">
    <meta name="robots" content="index, index">
    <meta name="keywords" content="skills, skillsbar">

    <title>SkillsBar</title>
    <link rel="stylesheet" href="/css/config.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            background: #429186;
            align-items: center;
            justify-content: center;
        }

        .container {
            position: relative;
            max-width: 500px;
            width: 100%;
            background: #fff;
            margin: 0 15px;
            padding: 10px 20px;
            border-radius: 7px;
        }

        .container .skill-box {
            width: 100%;
            margin: 25px 0;
        }

        .skill-box .title {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .skill-box .skill-bar {
            height: 8px;
            width: 100%;
            border-radius: 6px;
            margin-top: 6px;
            background: rgba(0, 0, 0, 0.1);
        }

        .skill-bar .skill-per {
            position: relative;
            display: block;
            height: 100%;
            width: 90%;
            border-radius: 6px;
            background: #0dabc0;
            animation: progress 0.4s ease-in-out forwards;
            opacity: 0;
        }

        .skill-per.css {
            width: 70%;
            animation-delay: 0.1s;
        }

        .skill-per.javascript {
            width: 50%;
            animation-delay: 0.2s;
        }

        .skill-per.nodejs {
            width: 30%;
            animation-delay: 0.3s;
        }

        @keyframes progress {
            0% {
                width: 0;
                opacity: 1;
            }

            100% {
                opacity: 1;
            }
        }

        .skill-per .tooltip {
            position: absolute;
            right: -14px;
            top: -28px;
            font-size: 9px;
            font-weight: 500;
            color: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            background: #0dabc0;
            z-index: 1;
        }

        .tooltip::before {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -2px;
            height: 10px;
            width: 10px;
            z-index: -1;
            background-color: #0dabc0;
            transform: translateX(-50%) rotate(45deg);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="skill-box">
            <span class="title">HTML</span>
            <div class="skill-bar">
                <span class="skill-per html">
                    <span class="tooltip">90%</span>
                </span>
            </div>
        </div>
        <div class="skill-box">
            <span class="title">CSS</span>
            <div class="skill-bar">
                <span class="skill-per css">
                    <span class="tooltip">70%</span>
                </span>
            </div>
        </div>
        <div class="skill-box">
            <span class="title">JavaScript</span>
            <div class="skill-bar">
                <span class="skill-per javascript">
                    <span class="tooltip">50%</span>
                </span>
            </div>
        </div>
        <div class="skill-box">
            <span class="title">C#</span>
            <div class="skill-bar">
                <span class="skill-per nodejs">
                    <span class="tooltip">30%</span>
                </span>
            </div>
        </div>
    </div>

</body>


</html>
