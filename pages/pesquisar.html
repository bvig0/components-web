<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="X-UA-Compatible" content="ie=7">
    <meta name="description" content="Projeto de página unica que mostra uma Caixa de pesquisa">
    <meta name="author" content="Brian Vigo de Oliveira">
    <meta name="robots" content="index, index">
    <meta name="keywords" content="Caixa de pesquisa, buscar, pesquisar">
    <title>Caixa de Pesquisa</title>
    <link rel="stylesheet" href="/css/config.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        @import url('/css/config.css');

        body {
            height: 100vh;
            width: 100%;
            background: #5ae25a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            max-width: 400px;
            width: 100%;
        }

        .box .search-box {
            position: relative;
            height: 50px;
            max-width: 50px;
            margin: auto;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.25);
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        #check:checked~.search-box {
            max-width: 380px;
        }

        .search-box input {
            position: absolute;
            height: 100%;
            width: 100%;
            border-radius: 25px;
            background: #fff;
            outline: none;
            border: none;
            padding-left: 20px;
            font-size: 18px;
        }

        .search-box .icon {
            position: absolute;
            right: -2px;
            top: 0;
            width: 50px;
            background: #fff;
            height: 100%;
            text-align: center;
            line-height: 50px;
            color: #5ae25a;
            font-size: 20px;
            border-radius: 25px;
        }

        #check:checked~.search-box .icon {
            background: #5ae25a;
            color: #fff;
            width: 60px;
            border-radius: 0 25px 25px 0;
        }

        #check {
            display: none;
        }
    </style>
</head>

<body>
    <div class="box">
        <input type="checkbox" id="check">
        <div class="search-box">
            <input type="text" placeholder="Digite aqui...">
            <label for="check" class="icon">
                <i class="fas fa-search"></i>
            </label>
        </div>
    </div>
</body>


</html>
